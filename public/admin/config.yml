backend:
  name: github
  repo: kodai-utsunomiya-mdl/kodai-utsunomiya-mdl.github.io
  branch: main
  base_url: https://kodai-utsunomiya.vercel.app
  auth_endpoint: /api/auth

local_backend: true

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: blog
    label: Blog
    folder: src/content/blog
    create: true
    slug: "{{slug}}"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: description, label: Description, widget: string, required: false }
      - { name: pubDate, label: Publish Date, widget: datetime }
      - { name: draft, label: Draft, widget: boolean, default: false }
      - { name: body, label: Body, widget: markdown }
