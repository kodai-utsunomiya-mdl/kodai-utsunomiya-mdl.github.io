<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="robots" content="noindex">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Content Manager</title>
  </head>
  <body>
    <script>
      const params = new URLSearchParams(window.location.search);
      const isDebug = params.get('debug') === '1';
      let debugPanel;

      const ensurePanel = () => {
        if (!isDebug || debugPanel) return;
        debugPanel = document.createElement('pre');
        debugPanel.style.cssText = [
          'position: fixed',
          'bottom: 12px',
          'right: 12px',
          'max-width: 420px',
          'max-height: 60vh',
          'overflow: auto',
          'padding: 12px',
          'background: rgba(0,0,0,0.85)',
          'color: #fff',
          'font-size: 12px',
          'line-height: 1.4',
          'border-radius: 6px',
          'z-index: 9999'
        ].join(';');
        debugPanel.textContent = 'Decap Debug Log\n';
        document.body.appendChild(debugPanel);
      };

      const maskToken = (token) => {
        if (!token) return 'none';
        return `${token.slice(0, 12)}...${token.slice(-6)}`;
      };

      const logDebug = (message) => {
        if (!isDebug) return;
        ensurePanel();
        debugPanel.textContent += `${new Date().toISOString()} ${message}\n`;
      };

      const deliverToken = () => {
        const rawToken = window.localStorage.getItem('decap_auth_token');
        if (!rawToken) {
          logDebug('deliverToken: no token in localStorage');
          return;
        }

        const origin = window.location.origin;
        const tokens = [rawToken];
        if (rawToken.startsWith('authorization:') && !rawToken.startsWith('authorization:github:')) {
          const value = rawToken.replace('authorization:', '');
          tokens.push(`authorization:github:${value}`);
        }
        let attempts = 0;
        const maxAttempts = 20;
        logDebug(`deliverToken: start, token=${maskToken(rawToken)}`);
        const interval = setInterval(() => {
          tokens.forEach((token) => window.postMessage(token, origin));
          attempts += 1;
          logDebug(`deliverToken: postMessage attempt ${attempts}`);
          if (attempts >= maxAttempts) {
            clearInterval(interval);
            window.localStorage.removeItem('decap_auth_token');
            logDebug('deliverToken: done, token removed');
          }
        }, 250);
      };

      window.addEventListener('message', (event) => {
        logDebug(`message received: origin=${event.origin} data=${String(event.data).slice(0, 80)}`);
      });

      window.addEventListener('load', () => {
        logDebug('load: admin loaded');
        logDebug(`localStorage token=${maskToken(window.localStorage.getItem('decap_auth_token'))}`);
        deliverToken();
      });

      window.addEventListener('storage', (event) => {
        if (event.key === 'decap_auth_token') {
          logDebug('storage: token updated');
          deliverToken();
        }
      });
    </script>
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
    <script src="https://unpkg.com/decap-cms@^3/dist/decap-cms.js"></script>
    <script>
      CMS.init({
        config: {
          backend: {
            name: 'github',
            repo: 'kodai-utsunomiya-mdl/kodai-utsunomiya-mdl.github.io',
            branch: 'main',
            auth_scope: 'repo'
          },
          auth_endpoint: 'https://kodai-utsunomiya.vercel.app/api/auth',
          site_url: 'https://kodai-utsunomiya.vercel.app',
          media_folder: 'public/uploads',
          public_folder: '/uploads',
          collections: [
            {
              name: 'blog',
              label: 'Notes',
              folder: 'src/content/blog',
              create: true,
              slug: '{{slug}}',
              fields: [
                { name: 'title', label: 'Title', widget: 'string' },
                { name: 'description', label: 'Description', widget: 'string', required: false },
                { name: 'pubDate', label: 'Publish Date', widget: 'datetime' },
                { name: 'draft', label: 'Draft', widget: 'boolean', default: false },
                { name: 'body', label: 'Body', widget: 'markdown' }
              ]
            }
          ]
        }
      });
    </script>
  </body>
</html>
