<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="robots" content="noindex">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Content Manager</title>
  </head>
  <body>
    <script>
      window.addEventListener('load', () => {
        const token = window.localStorage.getItem('decap_auth_token');
        if (token) {
          window.postMessage(token, window.location.origin);
          window.localStorage.removeItem('decap_auth_token');
        }
      });
    </script>
    <script src="https://unpkg.com/decap-cms@^3/dist/decap-cms.js"></script>
  </body>
</html>
