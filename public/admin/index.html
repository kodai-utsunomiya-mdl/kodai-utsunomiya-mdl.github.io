<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="robots" content="noindex">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Content Manager</title>
  </head>
  <body>
    <script>
      const deliverToken = () => {
        const token = window.localStorage.getItem('decap_auth_token');
        if (!token) return;

        const origin = window.location.origin;
        let attempts = 0;
        const maxAttempts = 20;
        const interval = setInterval(() => {
          window.postMessage(token, origin);
          attempts += 1;
          if (attempts >= maxAttempts) {
            clearInterval(interval);
            window.localStorage.removeItem('decap_auth_token');
          }
        }, 250);
      };

      window.addEventListener('load', deliverToken);
      window.addEventListener('storage', (event) => {
        if (event.key === 'decap_auth_token') {
          deliverToken();
        }
      });
    </script>
    <script src="https://unpkg.com/decap-cms@^3/dist/decap-cms.js"></script>
  </body>
</html>
